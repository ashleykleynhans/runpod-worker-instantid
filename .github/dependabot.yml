version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/src"
    schedule:
      interval: "weekly"
    ignore:
      # Torch is pinned to match CUDA 12.4 and xformers compatibility
      - dependency-name: "torch"
      - dependency-name: "torchvision"
      - dependency-name: "torchaudio"
      # xformers newer versions require newer torch, keep pinned
      - dependency-name: "xformers"
      # Avoid major version bumps that break backward compatibility
      - dependency-name: "diffusers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "transformers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "accelerate"
        update-types: ["version-update:semver-major"]
      - dependency-name: "peft"
        update-types: ["version-update:semver-major"]
      - dependency-name: "insightface"
        update-types: ["version-update:semver-major"]
      - dependency-name: "huggingface-hub"
        update-types: ["version-update:semver-major"]
